<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Nâng Cấp Quản Lý Điểm Sinh Viên</title>
    <link rel="stylesheet" href="bangdiemSV.css" />
  </head>
  <body>
    <div class="container">
      <h2>Quản Lý Điểm Sinh Viên (Pro)</h2>
      <div class="input-group">
        <input type="text" id="txtName" placeholder="Họ tên..." />
        <input
          type="number"
          id="txtScore"
          placeholder="Điểm (0-10)"
          step="0.1"
        />
        <button id="btnAdd">Thêm</button>
      </div>

      <div class="filter-bar">
        <input
          type="text"
          id="searchName"
          placeholder=" Tìm tên sinh viên..."
        />

        <select id="filterRank">
          <option value="All">Tất cả xếp loại</option>
          <option value="Giỏi">Giỏi (>= 8.5)</option>
          <option value="Khá">Khá (>= 7.0)</option>
          <option value="Trung bình">Trung bình (>= 5.0)</option>
          <option value="Yếu">Yếu (< 5.0)</option>
        </select>
      </div>
      <table>
        <thead>
          <tr>
            <th>STT</th>
            <th>Họ tên</th>
            <th id="sortScore" style="cursor: pointer">
              Điểm <span id="sortIcon">↕</span>
            </th>
            <th>Xếp loại</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
      <div class="summary" id="summaryStats"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
